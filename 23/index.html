<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Switcher - Lab 23</title>
    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style id="dynamicStyle">
        /* Default Style */
        body { background-color: #ffffff; color: #000000; transition: all 0.3s ease; }
        .btn-style { margin: 10px; padding: 15px 30px; }
        .sample-control { margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container text-center mt-5">
        <h2>Multi-Style Page Switcher</h2>
        <p class="text-muted">Click a button to change the entire page's theme and control styles.</p>

        <div class="mb-5">
            <button id="style1" class="btn btn-dark btn-style">Dark Mode</button>
            <button id="style2" class="btn btn-primary btn-style">Blue Ocean</button>
            <button id="style3" class="btn btn-success btn-style">Nature Green</button>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6 text-start">
                <div class="sample-control">
                    <label>Text Input:</label>
                    <input type="text" class="form-control" value="Sample text here...">
                </div>
                <div class="sample-control">
                    <label>Dropdown:</label>
                    <select class="form-select">
                        <option>Option 1</option>
                        <option>Option 2</option>
                    </select>
                </div>
                <div class="sample-control text-center">
                    <button class="btn btn-outline-secondary">Secondary Button</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Style 1: Dark Mode
            $("#style1").click(function() {
                $("body").css({ "background-color": "#212529", "color": "#f8f9fa" });
                $(".sample-control").css({ "background-color": "#343a40", "border-color": "#495057" });
                $(".form-control, .form-select").css({ "background-color": "#495057", "color": "white", "border-color": "#6c757d" });
            });

            // Style 2: Blue Ocean
            $("#style2").click(function() {
                $("body").css({ "background-color": "#e3f2fd", "color": "#0d47a1" });
                $(".sample-control").css({ "background-color": "#bbdefb", "border-color": "#90caf9" });
                $(".form-control, .form-select").css({ "background-color": "#ffffff", "color": "#0d47a1", "border-color": "#64b5f6" });
            });

            // Style 3: Nature Green
            $("#style3").click(function() {
                $("body").css({ "background-color": "#e8f5e9", "color": "#1b5e20" });
                $(".sample-control").css({ "background-color": "#c8e6c9", "border-color": "#a5d6a7" });
                $(".form-control, .form-select").css({ "background-color": "#ffffff", "color": "#1b5e20", "border-color": "#81c784" });
            });
        });
    </script>
</body>
</html>
