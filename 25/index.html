<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal - Lab 25</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2c3e50; color: white; padding-top: 50px; text-align: center; }
        
        .signal-box {
            width: 120px;
            background-color: #333;
            border: 5px solid #1a1a1a;
            border-radius: 20px;
            padding: 20px 0;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .light {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #444;
            margin: 15px auto;
            transition: all 0.3s ease;
        }

        /* Glowing States */
        .red.active { background-color: #ff0000; box-shadow: 0 0 40px #ff0000; }
        .yellow.active { background-color: #ffcc00; box-shadow: 0 0 40px #ffcc00; }
        .green.active { background-color: #00ff00; box-shadow: 0 0 40px #00ff00; }

        .btn-group { margin-top: 30px; }
        .status-text { font-size: 1.5rem; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Traffic Signal Simulation</h2>
        <p class="text-secondary">Control the signal lights using the buttons below.</p>

        <div class="signal-box">
            <div id="red" class="light red"></div>
            <div id="yellow" class="light yellow"></div>
            <div id="green" class="light green"></div>
        </div>

        <div id="status" class="status-text text-danger">STOP</div>

        <div class="btn-group">
            <button class="btn btn-danger" onclick="changeLight('red', 'STOP')">Red</button>
            <button class="btn btn-warning" onclick="changeLight('yellow', 'READY')">Yellow</button>
            <button class="btn btn-success" onclick="changeLight('green', 'GO')">Green</button>
        </div>
        
        <div class="mt-4">
            <button class="btn btn-outline-info" onclick="startAuto()">Auto Mode</button>
            <button class="btn btn-outline-light" onclick="stopAuto()">Manual Mode</button>
        </div>
    </div>

    <script>
        let autoInterval = null;

        function changeLight(color, text) {
            // Remove active class from all
            document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
            
            // Add active class to selected
            document.getElementById(color).classList.add('active');
            
            // Update text
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = text;
            
            // Update text color
            if (color === 'red') statusDiv.className = 'status-text text-danger';
            if (color === 'yellow') statusDiv.className = 'status-text text-warning';
            if (color === 'green') statusDiv.className = 'status-text text-success';
        }

        function startAuto() {
            if (autoInterval) return;
            let current = 0;
            const sequence = [
                { color: 'red', text: 'STOP' },
                { color: 'yellow', text: 'READY' },
                { color: 'green', text: 'GO' }
            ];

            autoInterval = setInterval(() => {
                const step = sequence[current];
                changeLight(step.color, step.text);
                current = (current + 1) % sequence.length;
            }, 2000);
        }

        function stopAuto() {
            clearInterval(autoInterval);
            autoInterval = null;
        }

        // Initialize
        changeLight('red', 'STOP');
    </script>
</body>
</html>
