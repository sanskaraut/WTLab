<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle - Lab 28</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .app-container { height: 100vh; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
        .light-mode { background-color: #ffffff; color: #333333; }
        .dark-mode { background-color: #1a1a1a; color: #ffffff; }
        .theme-card { padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .dark-mode .theme-card { background-color: #2d2d2d; border-color: #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Task 2: useState to store current theme
            const [theme, setTheme] = useState("light");

            // Task 1: Toggle Function
            const toggleTheme = () => {
                setTheme(prev => prev === "light" ? "dark" : "light");
            };

            return (
                // Task 3: Change colors dynamically via classes
                <div className={`app-container ${theme === "light" ? "light-mode" : "dark-mode"}`}>
                    <div className="theme-card text-center">
                        <h1 className="mb-4">React Theme Switcher</h1>
                        
                        {/* Task 4: Display current theme mode */}
                        <p className="lead mb-4">Current Mode: <strong>{theme.toUpperCase()}</strong></p>

                        <button 
                            className={`btn btn-lg ${theme === "light" ? "btn-dark" : "btn-light"}`}
                            onClick={toggleTheme}
                        >
                            Switch to {theme === "light" ? "Dark" : "Light"} Mode
                        </button>

                        <div className="mt-5">
                            <p className="text-muted">This state is managed via <code>useState()</code> hook.</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
