<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Login - VIT Books</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-5">
    <div class="container card p-4 shadow-sm" style="max-width: 400px;">
        <h3 class="text-center">Member Login</h3>
        <input type="text" class="form-control mb-2" placeholder="Username">
        <input type="password" class="form-control mb-3" placeholder="Password">
        <a href="/" class="btn btn-primary w-100">Login</a>
    </div>
</body>
</html>
<!-- slide -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Catalog - VIT Books</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-5">
    <div class="container">
        <h3>Available Books</h3>
        <ul class="list-group">
            <li th:each="book : ${books}" class="list-group-item" th:text="${book}"></li>
        </ul>
        <a href="/" class="btn btn-secondary mt-3">Back Home</a>
    </div>
</body>
</html>
<!-- slide -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Register - VIT Books</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-5">
    <div class="container card p-4 shadow-sm" style="max-width: 400px;">
        <h3 class="text-center">New Registration</h3>
        <form action="/register" method="POST">
            <input type="text" name="name" class="form-control mb-2" placeholder="Your Name" required>
            <input type="email" class="form-control mb-2" placeholder="Email">
            <button class="btn btn-success w-100">Sign Up</button>
        </form>
    </div>
</body>
</html>
