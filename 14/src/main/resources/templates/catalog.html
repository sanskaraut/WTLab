<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Catalog - VIT Books</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-5">
    <div class="container">
        <h3>Available Books</h3>
        <ul class="list-group">
            <li th:each="book : ${books}" class="list-group-item" th:text="${book}"></li>
        </ul>
        <a href="/" class="btn btn-secondary mt-3">Back Home</a>
    </div>
</body>
</html>
