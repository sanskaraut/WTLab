<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>VIT Book Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">VIT Books</a>
            <div>
                <a class="btn btn-outline-light me-2" href="/login">Login</a>
                <a class="btn btn-outline-light me-2" href="/register">Register</a>
                <a class="btn btn-outline-light" href="/catalog">Catalog</a>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
        <h1 class="display-4">Welcome to our Online Bookstore</h1>
        <p class="lead">Built with Spring Boot and Thymeleaf.</p>
        <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=800&q=80" class="img-fluid rounded shadow mt-3" style="max-height: 300px;">
    </div>
</body>
</html>
