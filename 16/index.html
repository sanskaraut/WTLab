<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - Lab 16</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #00b4db, #0083b0); height: 100vh; display: flex; align-items: center; }
        .converter-card { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .conversion-display { font-size: 2rem; font-weight: bold; color: #0083b0; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [usd, setUsd] = useState(1);
            const rate = 83.50; // Fixed rate for demo

            const handleUsdChange = (e) => {
                const val = e.target.value;
                setUsd(val);
            };

            return (
                <div className="container">
                    <div className="row justify-content-center">
                        <div className="col-md-5">
                            <div className="card converter-card p-4 text-center">
                                <h2 className="mb-4">USD to INR Converter</h2>
                                
                                <div className="mb-4 text-start">
                                    <label className="form-label text-muted">Amount in US Dollars ($)</label>
                                    <div className="input-group input-group-lg">
                                        <span className="input-group-text">$</span>
                                        <input 
                                            type="number" 
                                            className="form-control" 
                                            value={usd} 
                                            onChange={handleUsdChange}
                                            placeholder="Enter dollars"
                                        />
                                    </div>
                                </div>

                                <div className="p-3 bg-light rounded-3">
                                    <div className="text-muted small mb-1">Equivalent in Indian Rupees</div>
                                    <div className="conversion-display">
                                        ₹ {(usd * rate).toLocaleString('en-IN', { minimumFractionDigits: 2 })}
                                    </div>
                                    <div className="text-secondary small mt-2">Rate: 1 USD = ₹ {rate}</div>
                                </div>

                                <p className="mt-4 text-muted small">Real-time conversion using React State</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
