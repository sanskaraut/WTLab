<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Lab 29</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; color: #00ff00; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', Courier, monospace; }
        .clock-container { border: 2px solid #00ff00; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px #00ff00; background: #000; text-align: center; }
        .time-display { font-size: 4rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Task 1: Functional React Component
        function DigitalClock() {
            // Task 2: useState for current time
            const [time, setTime] = useState(new Date());
            const [isRunning, setIsRunning] = useState(true);

            // Task 3: useEffect for interval
            useEffect(() => {
                let timerID;
                if (isRunning) {
                    timerID = setInterval(() => {
                        setTime(new Date());
                    }, 1000);
                }

                // Cleanup function to clear interval
                return () => clearInterval(timerID);
            }, [isRunning]);

            // Task 4: Format time to HH:MM:SS
            const formatTime = (date) => {
                let h = date.getHours().toString().padStart(2, '0');
                let m = date.getMinutes().toString().padStart(2, '0');
                let s = date.getSeconds().toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            return (
                <div className="clock-container">
                    <h2 className="text-uppercase mb-4" style={{fontSize: '1rem', letterSpacing: '3px'}}>Digital Timepiece</h2>
                    <div className="time-display">
                        {formatTime(time)}
                    </div>
                    
                    {/* Task 5: Start/Stop option */}
                    <button 
                        className={`btn btn-outline-${isRunning ? 'danger' : 'success'} px-5`}
                        onClick={() => setIsRunning(!isRunning)}
                    >
                        {isRunning ? 'STOP CLOCK' : 'START CLOCK'}
                    </button>

                    <div className="mt-3 text-secondary small" style={{fontSize: '0.7rem'}}>
                        State-managed every 1000ms
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DigitalClock />);
    </script>
</body>
</html>
