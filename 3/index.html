<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Operations - Lab 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding: 50px; }
        .card { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .result-box { background: #e9ecef; padding: 15px; border-radius: 5px; min-height: 50px; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4">JS Array Operations</h2>
                    
                    <div class="mb-3">
                        <label class="form-label">Enter Array Elements (comma separated):</label>
                        <input type="text" id="arrayInput" class="form-control" placeholder="e.g. 40, 10, 30, 20, 50" value="40, 10, 30, 20, 50">
                    </div>

                    <div class="d-grid gap-2 d-md-block text-center">
                        <button class="btn btn-primary" onclick="reverseArray()">Reverse</button>
                        <button class="btn btn-success" onclick="sortArray()">Sort (Asc)</button>
                        <button class="btn btn-warning" onclick="sortArrayDesc()">Sort (Desc)</button>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label">Search Element:</label>
                        <div class="input-group">
                            <input type="text" id="searchInput" class="form-control" placeholder="Enter value to search">
                            <button class="btn btn-info text-white" onclick="searchArray()">Search</button>
                        </div>
                    </div>

                    <div class="mt-4">
                        <h5>Output:</h5>
                        <div id="output" class="result-box">Result will appear here...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getArray() {
            let input = document.getElementById('arrayInput').value;
            // Split by comma and convert to numbers, trimming whitespace
            return input.split(',').map(item => item.trim()).filter(item => item !== "");
        }

        function display(arr) {
            document.getElementById('output').innerText = "[ " + arr.join(', ') + " ]";
        }

        function reverseArray() {
            let arr = getArray();
            arr.reverse();
            display(arr);
        }

        function sortArray() {
            let arr = getArray();
            // Numeric sort
            arr.sort((a, b) => a - b);
            display(arr);
        }

        function sortArrayDesc() {
            let arr = getArray();
            arr.sort((a, b) => b - a);
            display(arr);
        }

        function searchArray() {
            let arr = getArray();
            let searchVal = document.getElementById('searchInput').value.trim();
            if (searchVal === "") {
                alert("Please enter a value to search");
                return;
            }
            let index = arr.indexOf(searchVal);
            if (index !== -1) {
                document.getElementById('output').innerText = `Element '${searchVal}' found at index ${index}`;
            } else {
                document.getElementById('output').innerText = `Element '${searchVal}' not found in the array`;
            }
        }
    </script>
</body>
</html>
